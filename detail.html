<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3 Bích Coffee - Chi tiết sản phẩm</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&display=swap" rel="stylesheet">
</head>
<body class="bg-gray-50 font-sans text-gray-800">

    <header class="bg-red-800 text-white sticky top-0 z-50 shadow-md">
        <div class="container mx-auto px-4 lg:px-8 h-20 flex justify-between items-center">
            <div class="flex items-center space-x-2 cursor-pointer" onclick="window.location.href='index.html'">
                <div class="bg-white text-red-800 p-1.5 rounded-full h-10 w-10 flex items-center justify-center"><i class="ph-fill ph-spade text-2xl"></i></div>
                <span style="font-family: 'Oswald', sans-serif;" class="text-2xl uppercase tracking-tighter">3 Bích Coffee</span>
            </div>
            <a href="list.html" class="flex items-center gap-2 bg-white/20 px-5 py-2 rounded-full font-bold uppercase text-[10px] transition hover:bg-white/30">
                <i class="ph ph-arrow-left"></i> Quay lại
            </a>
        </div>
    </header>

    <main class="container mx-auto px-4 lg:px-8 py-12" id="detailContent">
        <div class="text-center py-20 animate-pulse text-gray-300 font-black text-4xl uppercase">Đang tải...</div>
    </main>

    <script>
        // Dữ liệu sản phẩm (Phải khớp với file list.html)
        const products = [
            { id: 1, name: 'Cà Phê Đen', price: 12000, category: 'Cà Phê', description: 'Hương vị cà phê rang mộc nguyên chất, đậm đà theo gu truyền thống.', image: 'https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?auto=format&fit=crop&w=1000&q=80' },
            { id: 2, name: 'Cà Phê Sữa', price: 15000, category: 'Cà Phê', description: 'Sự hòa quyện tuyệt vời giữa cà phê đậm đà và vị béo ngậy của sữa đặc.', image: 'https://images.unsplash.com/photo-1541167760496-1628856ab772?auto=format&fit=crop&w=1000&q=80' },
            { id: 3, name: 'Bạc Sỉu Đá', price: 20000, category: 'Cà Phê', description: 'Nhiều sữa ít cà phê, vị béo dịu dàng nhưng vẫn phảng phất hương thơm rang xay.', image: 'https://images.unsplash.com/photo-1461023058943-07fcbe16d735?auto=format&fit=crop&w=1000&q=80' },
            { id: 4, name: 'Cà Phê Kem Muối', price: 25000, category: 'Món Đặc Biệt', description: 'Món đinh của quán. Lớp kem mặn béo ngậy phía trên quyện cùng cà phê đá cực kỳ lôi cuốn.', image: 'https://images.unsplash.com/photo-1517701550927-30cf0b081792?auto=format&fit=crop&w=1000&q=80' },
            { id: 7, name: 'Trà Tắc', price: 10000, category: 'Trà Trái Cây', description: 'Thức uống giải nhiệt dân dã, chua thanh mát lành cho ngày nắng nóng.', image: 'https://images.unsplash.com/photo-1556679343-c7306c1976bc?auto=format&fit=crop&w=1000&q=80' },
            { id: 8, name: 'Trà Đào Dầm', price: 20000, category: 'Trà Trái Cây', description: 'Trà thanh nhẹ kết hợp miếng đào tươi dầm giòn tan, vị ngọt sảng khoái.', image: 'https://images.unsplash.com/photo-1558160074-4d7d8bdf4256?auto=format&fit=crop&w=1000&q=80' },
            { id: 10, name: 'Milo Sữa Dầm', price: 18000, category: 'Món Đặc Biệt', description: 'Đậm đặc vị milo hòa sữa béo, rắc thêm lớp bột cacao giòn thơm hấp dẫn.', image: 'https://images.unsplash.com/photo-1544145945-f904253d0c7b?auto=format&fit=crop&w=1000&q=80' }
        ];

        // Lấy mã ID từ đường dẫn trang web
        const urlParams = new URLSearchParams(window.location.search);
        const productId = parseInt(urlParams.get('id'));
        const product = products.find(p => p.id === productId);

        const container = document.getElementById('detailContent');
        if (product) {
            container.innerHTML = `
                <div class="bg-white rounded-[3rem] overflow-hidden shadow-2xl flex flex-col md:flex-row border border-gray-100 max-w-5xl mx-auto">
                    <div class="md:w-1/2 overflow-hidden"><img src="${product.image}" class="w-full h-[400px] md:h-[650px] object-cover hover:scale-105 transition duration-1000" /></div>
                    <div class="md:w-1/2 p-10 md:p-16 flex flex-col justify-center">
                        <span class="text-red-800 font-bold uppercase tracking-[0.3em] text-[10px] mb-4 inline-block bg-red-50 px-4 py-1.5 rounded-full border border-red-100">${product.category}</span>
                        <h1 class="text-4xl md:text-5xl font-black text-gray-900 mb-6 uppercase leading-tight tracking-tighter">${product.name}</h1>
                        <p class="text-gray-400 text-lg leading-relaxed mb-10 italic">"${product.description}"</p>
                        <div class="text-5xl font-black text-red-800 mb-10">${product.price.toLocaleString('vi-VN')}đ</div>
                        <button onclick="alert('Đã thêm món vào giỏ hàng!')" class="bg-red-800 text-white w-full py-5 rounded-3xl font-black hover:bg-red-700 transition uppercase tracking-widest shadow-2xl shadow-red-100">Thêm vào giỏ</button>
                    </div>
                </div>
            `;
        } else {
            container.innerHTML = `<div class="text-center py-20 font-black uppercase text-gray-300 text-2xl">Món này hiện không tồn tại</div>`;
        }
    </script>
</body>
</html>
